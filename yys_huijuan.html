<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴阳师绘卷总分计算器</title>
    <style>
        :root {
            --yys-blue: #4859f2; /* 模仿截图中的蓝色 */
            --bg-color: #f5f7fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .accounts-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            width: 320px;
            box-sizing: border-box;
        }
        /* 模仿截图中的名字样式 */
        .name-container {
            margin-bottom: 25px;
        }
        .acc-name {
            width: 100%;
            font-size: 20px;
            font-weight: 700;
            color: var(--yys-blue);
            border: none;
            border-bottom: 1.5px solid #e0e0e0; /* 截图中的下划线 */
            padding-bottom: 8px;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }
        .acc-name:focus {
            border-bottom-color: var(--yys-blue);
        }

        /* 输入框样式调整 */
        .input-item {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            padding-left: 2px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #edf0f5;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background: #fcfdfe;
            color: #333;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #d1d9e6;
            background: #fff;
        }

        /* 结果显示区 */
        .result {
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(145deg, #ffffff, #f0f4ff);
            border-radius: 10px;
            border: 1px solid #e8eeff;
            text-align: center;
        }
        .score-label {
            font-size: 12px;
            color: #99aab5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .score-value {
            font-size: 28px;
            font-weight: 800;
            color: #ff7e47; /* 橙色突出分数 */
        }
        .clear-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 8px;
            background: none;
            color: #bcc6d0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .clear-btn:hover {
            color: #ff5e5e;
        }

        @media (max-width: 768px) {
            .card { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>阴阳师绘卷总分计算器</h1>

    <div class="accounts-wrapper">
        <script>
            // 定义输入项顺序：ID, 标签名, 分值
            const items = [
                { id: 'small', label: '小绘卷 (10分)', val: 10 },
                { id: 'medium', label: '中绘卷 (20分)', val: 20 },
                { id: 'large', label: '大绘卷 (100分)', val: 100 },
                { id: 'base', label: '现有底分 (直接累加)', val: 1 }
            ];

            for (let i = 0; i < 3; i++) {
                let html = `
                <div class="card">
                    <div class="name-container">
                        <input type="text" class="acc-name" id="name_${i}" value="账号 ${i+1}" oninput="saveAndCalc(${i})" placeholder="输入账号名">
                    </div>
                `;
                
                // 按顺序生成输入框
                items.forEach(item => {
                    html += `
                    <div class="input-item">
                        <label>${item.label}</label>
                        <input type="number" id="${item.id}_${i}" placeholder="0" oninput="saveAndCalc(${i})">
                    </div>
                    `;
                });

                html += `
                    <div class="result">
                        <div class="score-label">预计总分</div>
                        <div class="score-value" id="total_${i}">0</div>
                    </div>
                    <button class="clear-btn" onclick="clearData(${i})">清空数据</button>
                </div>
                `;
                document.write(html);
            }
        </script>
    </div>

    <script>
        window.onload = function() {
            for (let i = 0; i < 3; i++) {
                const savedName = localStorage.getItem(`name_${i}`);
                if (savedName) document.getElementById(`name_${i}`).value = savedName;

                ['small', 'medium', 'large', 'base'].forEach(key => {
                    document.getElementById(`${key}_${i}`).value = localStorage.getItem(`${key}_${i}`) || '';
                });
                calc(i);
            }
        };

        function saveAndCalc(i) {
            localStorage.setItem(`name_${i}`, document.getElementById(`name_${i}`).value);
            ['small', 'medium', 'large', 'base'].forEach(key => {
                localStorage.setItem(`${key}_${i}`, document.getElementById(`${key}_${i}`).value);
            });
            calc(i);
        }

        function calc(i) {
            const s = parseFloat(document.getElementById(`small_${i}`).value) || 0;
            const m = parseFloat(document.getElementById(`medium_${i}`).value) || 0;
            const l = parseFloat(document.getElementById(`large_${i}`).value) || 0;
            const base = parseFloat(document.getElementById(`base_${i}`).value) || 0;

            // 计算逻辑：小10，中20，大100 + 底分
            const total = (s * 10) + (m * 20) + (l * 100) + base;
            document.getElementById(`total_${i}`).innerText = total.toLocaleString();
        }

        function clearData(i) {
            if (confirm(`确定要清空“${document.getElementById(`name_${i}`).value}”的数据吗？`)) {
                ['small', 'medium', 'large', 'base'].forEach(key => {
                    document.getElementById(`${key}_${i}`).value = '';
                });
                saveAndCalc(i);
            }
        }
    </script>
</body>
</html>
