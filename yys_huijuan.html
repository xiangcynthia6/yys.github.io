<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴阳师绘卷总分计算器 (大容量跨端同步版)</title>
    <!-- 引入官方高稳定性二维码库 -->
    <script src="https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --yys-blue: #4859f2; 
            --bg-color: #f5f7fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        /* 新增：同步控制面板 */
        .sync-panel {
            background: #eef5fe;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            max-width: 1020px;
            box-sizing: border-box;
        }
        .btn {
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-info { background-color: #34495e; }
        .btn-info:hover { background-color: #2c3e50; }
        .btn-primary { background-color: #9b59b6; }
        .btn-primary:hover { background-color: #8e44ad; }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            max-width: 90%;
            width: 340px;
        }
        #qrcode {
            display: inline-block;
            margin: 15px 0;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .close-btn {
            background-color: #e05d5d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .accounts-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            width: 320px;
            box-sizing: border-box;
        }
        .name-container {
            margin-bottom: 25px;
        }
        .acc-name {
            width: 100%;
            font-size: 20px;
            font-weight: 700;
            color: var(--yys-blue);
            border: none;
            border-bottom: 1.5px solid #e0e0e0;
            padding-bottom: 8px;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }
        .acc-name:focus {
            border-bottom-color: var(--yys-blue);
        }
        .input-item {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            padding-left: 2px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #edf0f5;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background: #fcfdfe;
            color: #333;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #d1d9e6;
            background: #fff;
        }
        .result {
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(145deg, #ffffff, #f0f4ff);
            border-radius: 10px;
            border: 1px solid #e8eeff;
            text-align: center;
        }
        .score-label {
            font-size: 12px;
            color: #99aab5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .score-value {
            font-size: 28px;
            font-weight: 800;
            color: #ff7e47;
        }
        .clear-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 8px;
            background: none;
            color: #bcc6d0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .clear-btn:hover {
            color: #ff5e5e;
        }

        @media (max-width: 768px) {
            .card { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>阴阳师绘卷总分计算器</h1>

    <!-- 同步控制核心面板 -->
    <div class="sync-panel">
        <button class="btn btn-success" onclick="shareDataQR()">⚡ 生成高敏捷秒扫二维码</button>
        <button class="btn btn-info" onclick="exportDataText()">📋 备份全套纯净短码</button>
        <button class="btn btn-primary" onclick="importDataText()">📥 粘贴短码恢复数据</button>
    </div>

    <div class="accounts-wrapper">
        <script>
            const items = [
                { id: 'small', label: '小绘卷 (10分)', val: 10 },
                { id: 'medium', label: '中绘卷 (20分)', val: 20 },
                { id: 'large', label: '大绘卷 (100分)', val: 100 },
                { id: 'base', label: '现有底分 (直接累加)', val: 1 }
            ];

            for (let i = 0; i < 3; i++) {
                let html = `
                <div class="card">
                    <div class="name-container">
                        <input type="text" class="acc-name" id="name_${i}" value="账号 ${i+1}" oninput="saveAndCalc(${i})" placeholder="输入账号名">
                    </div>
                `;
                
                items.forEach(item => {
                    html += `
                    <div class="input-item">
                        <label>${item.label}</label>
                        <input type="number" id="${item.id}_${i}" min="0" max="65535" placeholder="0" oninput="saveAndCalc(${i})">
                    </div>
                    `;
                });

                html += `
                    <div class="result">
                        <div class="score-label">预计总分</div>
                        <div class="score-value" id="total_${i}">0</div>
                    </div>
                    <button class="clear-btn" onclick="clearData(${i})">清空数据</button>
                </div>
                `;
                document.write(html);
            }
        </script>
    </div>

    <!-- 二维码遮罩弹窗 -->
    <div class="modal" id="qrModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>📱 跨端同步/扫码</h3>
            <p style="font-size: 12px; color: #555; margin-bottom: 5px;">已排除冲突特殊字符，支持多端、微信内一秒识别：</p>
            <div id="qrcode"></div>
            <br>
            <button class="close-btn" onclick="closeModal()">关闭窗口</button>
        </div>
    </div>

    <script>
        const keys = ['small', 'medium', 'large', 'base'];

        /* ==================== 🛠️ URL 安全双字节（65535）编解码引擎 ==================== */
        function safeEncode(rawStr) {
            let base64 = btoa(encodeURIComponent(rawStr));
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function safeDecode(safeStr) {
            let base64 = safeStr.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64));
        }

        // 打包 3 个账号的完整信息：使用 '#' 连接各个账号，数值固定 4 位十六进制对齐
        function packAllAccounts() {
            let accountSegments = [];
            for (let i = 0; i < 3; i++) {
                const name = document.getElementById(`name_${i}`).value || `账号 ${i+1}`;
                let hexStream = "";
                keys.forEach(key => {
                    let val = parseInt(document.getElementById(`${key}_${i}`).value) || 0;
                    if (val > 65535) val = 65535; if (val < 0) val = 0;
                    hexStream += val.toString(16).padStart(4, '0'); // 4位对齐，支持至 65535
                });
                accountSegments.push(`${name}|${hexStream}`);
            }
            return accountSegments.join('#');
        }

        // 解包还原数据
        function unpackAllAccounts(packedString) {
            const accountSegments = packedString.split('#');
            accountSegments.forEach((seg, i) => {
                if (i >= 3) return; 
                const parts = seg.split('|');
                if (parts.length === 2) {
                    const name = parts[0];
                    const hexStream = parts[1];
                    document.getElementById(`name_${i}`).value = name;
                    localStorage.setItem(`name_${i}`, name);

                    keys.forEach((key, kIdx) => {
                        const subHex = hexStream.substr(kIdx * 4, 4);
                        const val = subHex ? parseInt(subHex, 16) : 0;
                        document.getElementById(`${key}_${i}`).value = val || '';
                        localStorage.setItem(`${key}_${i}`, val || '');
                    });
                    calc(i);
                }
            });
        }
        /* ===================================================================== */

        window.onload = function() {
            // 优先解析 URL 传参同步数据
            const urlParams = new URLSearchParams(window.location.search);
            const compactParam = urlParams.get('c');

            if (compactParam) {
                try {
                    const decodedStr = safeDecode(compactParam);
                    unpackAllAccounts(decodedStr);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    alert("🎉 绘卷数据跨端多号秒速同步成功！");
                } catch(e) {
                    alert("同步解析出错，可能密文不完整。");
                }
            } else {
                // 读取本地缓存
                for (let i = 0; i < 3; i++) {
                    const savedName = localStorage.getItem(`name_${i}`);
                    if (savedName) document.getElementById(`name_${i}`).value = savedName;

                    keys.forEach(key => {
                        document.getElementById(`${key}_${i}`).value = localStorage.getItem(`${key}_${i}`) || '';
                    });
                    calc(i);
                }
            }
        };

        function saveAndCalc(i) {
            localStorage.setItem(`name_${i}`, document.getElementById(`name_${i}`).value);
            keys.forEach(key => {
                let inputVal = document.getElementById(`${key}_${i}`).value;
                if (parseInt(inputVal) > 65535) {
                    inputVal = 65535;
                    document.getElementById(`${key}_${i}`).value = 65535;
                }
                localStorage.setItem(`${key}_${i}`, inputVal);
            });
            calc(i);
        }

        function calc(i) {
            const s = parseFloat(document.getElementById(`small_${i}`).value) || 0;
            const m = parseFloat(document.getElementById(`medium_${i}`).value) || 0;
            const l = parseFloat(document.getElementById(`large_${i}`).value) || 0;
            const base = parseFloat(document.getElementById(`base_${i}`).value) || 0;

            const total = (s * 10) + (m * 20) + (l * 100) + base;
            document.getElementById(`total_${i}`).innerText = total.toLocaleString();
        }

        function clearData(i) {
            if (confirm(`确定要清空“${document.getElementById(`name_${i}`).value}”的数据吗？`)) {
                keys.forEach(key => {
                    document.getElementById(`${key}_${i}`).value = '';
                });
                saveAndCalc(i);
            }
        }

        // 功能1：生成无视拦截的纯净 URL 二维码
        function shareDataQR() {
            const compactCode = safeEncode(packAllAccounts());
            const baseUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
            
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("qrModal").style.display = "flex";

            new QRCode(document.getElementById("qrcode"), {
                text: baseUrl + "?c=" + compactCode,
                width: 200, height: 200,
                colorDark : "#000000", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M  // 使用 M 级别纠错，格子大，秒读取
            });
        }

        function closeModal() { document.getElementById("qrModal").style.display = "none"; }

        // 功能2：文本导出
        function exportDataText() {
            const ultraShortText = safeEncode(packAllAccounts());
            const temp = document.createElement("textarea");
            temp.value = ultraShortText; document.body.appendChild(temp);
            temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
            alert("📋 【全本绘卷短码】已成功复制到剪贴板！可发至微信、文档等进行无损备份。");
        }

        // 功能3：文本导入
        function importDataText() {
            const code = prompt("请粘贴已备份的纯净绘卷短码：");
            if (!code || code.trim() === "") return;
            try {
                const decodedStr = safeDecode(code.trim());
                unpackAllAccounts(decodedStr);
                alert("🎉 全套备份数据导入恢复成功！");
            } catch(e) {
                alert("导入失败，格式校验未通过，请检查代码是否完整。");
            }
        }
    </script>
</body>
</html>
